<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0F1E34"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Grid -->
  <g stroke="rgba(76,214,128,0.05)" stroke-width="1">
    <line x1="0" y1="90"  x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Sol central -->
  <circle cx="400" cy="210" r="90" fill="rgba(245,197,24,0.07)" stroke="rgba(245,197,24,0.18)" stroke-width="1.5"/>
  <circle cx="400" cy="210" r="60" fill="rgba(245,197,24,0.12)"/>
  <circle cx="400" cy="210" r="36" fill="#F5C518" opacity="0.82"/>
  <g stroke="#F5C518" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
    <line x1="400" y1="108" x2="400" y2="94"/>
    <line x1="400" y1="312" x2="400" y2="326"/>
    <line x1="298"  y1="210" x2="284" y2="210"/>
    <line x1="502"  y1="210" x2="516" y2="210"/>
    <line x1="328"  y1="138" x2="318" y2="128"/>
    <line x1="472"  y1="282" x2="482" y2="292"/>
    <line x1="472"  y1="138" x2="482" y2="128"/>
    <line x1="328"  y1="282" x2="318" y2="292"/>
  </g>

  <!-- LADO ESQUERDO — Mitos (vermelho/amarelo) -->
  <!-- Bolhas de mito com X -->
  <!-- Mito 1 -->
  <circle cx="180" cy="150" r="46" fill="rgba(220,80,60,0.10)" stroke="rgba(220,80,60,0.45)" stroke-width="1.5"/>
  <path d="M165 135 L195 165 M195 135 L165 165" stroke="rgba(220,80,60,0.85)" stroke-width="3" stroke-linecap="round"/>
  <text x="180" y="205" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(220,80,60,0.65)" font-weight="500">"Só para ricos"</text>

  <!-- Mito 2 -->
  <circle cx="120" cy="270" r="38" fill="rgba(220,80,60,0.08)" stroke="rgba(220,80,60,0.35)" stroke-width="1.5"/>
  <path d="M108 258 L132 282 M132 258 L108 282" stroke="rgba(220,80,60,0.75)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="120" y="320" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(220,80,60,0.55)" font-weight="500">"Não funciona"</text>
  <text x="120" y="333" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(220,80,60,0.55)" font-weight="500">"em dias nublados"</text>

  <!-- Mito 3 - faint -->
  <circle cx="200" cy="340" r="30" fill="rgba(220,80,60,0.06)" stroke="rgba(220,80,60,0.28)" stroke-width="1"/>
  <path d="M190 330 L210 350 M210 330 L190 350" stroke="rgba(220,80,60,0.60)" stroke-width="2" stroke-linecap="round"/>

  <!-- Label MITOS -->
  <text x="155" y="80" text-anchor="middle" font-size="13" font-family="Inter,sans-serif"
        fill="rgba(220,80,60,0.55)" font-weight="600" letter-spacing="2">MITOS</text>
  <line x1="100" y1="88" x2="210" y2="88" stroke="rgba(220,80,60,0.25)" stroke-width="1"/>

  <!-- LADO DIREITO — Verdades (verde/lime) -->
  <!-- Verdade 1 -->
  <circle cx="620" cy="150" r="46" fill="rgba(76,214,128,0.10)" stroke="rgba(76,214,128,0.50)" stroke-width="1.5"/>
  <path d="M604 152 L615 163 L638 135" stroke="#4CD680" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="620" y="205" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(76,214,128,0.70)" font-weight="500">"Instala grátis"</text>

  <!-- Verdade 2 -->
  <circle cx="680" cy="270" r="38" fill="rgba(76,214,128,0.08)" stroke="rgba(76,214,128,0.40)" stroke-width="1.5"/>
  <path d="M666 272 L677 283 L698 257" stroke="#4CD680" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="680" y="320" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(76,214,128,0.60)" font-weight="500">"Até 95%"</text>
  <text x="680" y="333" text-anchor="middle" font-size="10" font-family="Inter,sans-serif" fill="rgba(76,214,128,0.60)" font-weight="500">"de economia"</text>

  <!-- Verdade 3 -->
  <circle cx="600" cy="340" r="30" fill="rgba(76,214,128,0.06)" stroke="rgba(76,214,128,0.30)" stroke-width="1"/>
  <path d="M588 342 L598 352 L616 330" stroke="#4CD680" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label VERDADES -->
  <text x="645" y="80" text-anchor="middle" font-size="13" font-family="Inter,sans-serif"
        fill="rgba(76,214,128,0.60)" font-weight="600" letter-spacing="2">VERDADES</text>
  <line x1="590" y1="88" x2="700" y2="88" stroke="rgba(76,214,128,0.25)" stroke-width="1"/>

  <!-- Divisória vertical central (pontilhada) -->
  <line x1="400" y1="70" x2="400" y2="400" stroke="rgba(237,244,240,0.08)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Linha base -->
  <line x1="0" y1="408" x2="800" y2="408" stroke="rgba(76,214,128,0.10)" stroke-width="1"/>
</svg>
