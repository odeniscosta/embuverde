<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D4A32"/>
      <stop offset="100%" stop-color="#0B1628"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CD680"/>
      <stop offset="100%" stop-color="#1A7A52"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Grid sutil -->
  <g stroke="rgba(76,214,128,0.06)" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Sol -->
  <circle cx="640" cy="100" r="70" fill="rgba(245,197,24,0.08)" stroke="rgba(245,197,24,0.20)" stroke-width="1"/>
  <circle cx="640" cy="100" r="46" fill="rgba(245,197,24,0.14)"/>
  <circle cx="640" cy="100" r="26" fill="#F5C518" opacity="0.80"/>
  <g stroke="#F5C518" stroke-width="2" stroke-linecap="round" opacity="0.40">
    <line x1="640" y1="52" x2="640" y2="42"/>
    <line x1="640" y1="148" x2="640" y2="158"/>
    <line x1="592" y1="100" x2="582" y2="100"/>
    <line x1="688" y1="100" x2="698" y2="100"/>
    <line x1="606" y1="66" x2="599" y2="59"/>
    <line x1="674" y1="134" x2="681" y2="141"/>
    <line x1="674" y1="66" x2="681" y2="59"/>
    <line x1="606" y1="134" x2="599" y2="141"/>
  </g>

  <!-- Árvore principal -->
  <!-- Copa (círculos) -->
  <circle cx="300" cy="200" r="90" fill="url(#leafGrad)" opacity="0.90"/>
  <circle cx="250" cy="230" r="65" fill="url(#leafGrad)" opacity="0.85"/>
  <circle cx="350" cy="235" r="70" fill="url(#leafGrad)" opacity="0.85"/>
  <circle cx="300" cy="165" r="55" fill="#4CD680" opacity="0.80"/>
  <!-- Tronco -->
  <rect x="285" y="290" width="30" height="80" rx="6" fill="#1A7A52"/>
  <!-- Raízes -->
  <path d="M270 370 Q250 380 230 375" stroke="#1A7A52" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.60"/>
  <path d="M330 370 Q350 380 370 375" stroke="#1A7A52" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.60"/>
  <path d="M300 370 Q300 385 300 390" stroke="#1A7A52" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.60"/>

  <!-- Folhas flutuando -->
  <g fill="#4CD680" opacity="0.70">
    <ellipse cx="180" cy="170" rx="10" ry="6" transform="rotate(-30 180 170)"/>
    <ellipse cx="430" cy="150" rx="8" ry="5" transform="rotate(20 430 150)"/>
    <ellipse cx="160" cy="260" rx="9" ry="5" transform="rotate(-45 160 260)"/>
    <ellipse cx="450" cy="220" rx="11" ry="6" transform="rotate(15 450 220)"/>
    <ellipse cx="200" cy="310" rx="7" ry="4" transform="rotate(-20 200 310)"/>
    <ellipse cx="140" cy="200" rx="8" ry="5" transform="rotate(35 140 200)"/>
  </g>

  <!-- Partículas CO2 → O2 -->
  <g opacity="0.50">
    <!-- CO2 entrando na árvore (lado esquerdo) -->
    <circle cx="140" cy="240" r="14" stroke="rgba(245,197,24,0.60)" stroke-width="1.5" fill="rgba(245,197,24,0.08)"/>
    <text x="140" y="245" text-anchor="middle" fill="rgba(245,197,24,0.80)" font-size="9" font-family="Inter,sans-serif">CO₂</text>
    <circle cx="100" cy="210" r="10" stroke="rgba(245,197,24,0.40)" stroke-width="1" fill="rgba(245,197,24,0.06)"/>
    <text x="100" y="214" text-anchor="middle" fill="rgba(245,197,24,0.60)" font-size="7" font-family="Inter,sans-serif">CO₂</text>
    <!-- O2 saindo (lado direito) -->
    <circle cx="460" cy="200" r="14" stroke="rgba(76,214,128,0.70)" stroke-width="1.5" fill="rgba(76,214,128,0.10)"/>
    <text x="460" y="205" text-anchor="middle" fill="rgba(76,214,128,0.90)" font-size="9" font-family="Inter,sans-serif">O₂</text>
    <circle cx="490" cy="165" r="10" stroke="rgba(76,214,128,0.50)" stroke-width="1" fill="rgba(76,214,128,0.07)"/>
    <text x="490" y="169" text-anchor="middle" fill="rgba(76,214,128,0.70)" font-size="7" font-family="Inter,sans-serif">O₂</text>
  </g>

  <!-- Linha do solo -->
  <line x1="0" y1="395" x2="800" y2="395" stroke="rgba(76,214,128,0.15)" stroke-width="1"/>

  <!-- Silhueta cidade no fundo -->
  <g fill="rgba(13,74,50,0.20)" stroke="rgba(76,214,128,0.08)" stroke-width="1">
    <rect x="540" y="320" width="20" height="75"/>
    <rect x="564" y="340" width="15" height="55"/>
    <rect x="582" y="308" width="28" height="87"/>
    <rect x="614" y="330" width="18" height="65"/>
    <rect x="636" y="315" width="35" height="80"/>
    <rect x="675" y="345" width="16" height="50"/>
    <rect x="695" y="328" width="26" height="67"/>
    <rect x="724" y="338" width="20" height="57"/>
    <rect x="748" y="320" width="30" height="75"/>
  </g>
</svg>
