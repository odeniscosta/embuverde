<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#113D2A"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD94A"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CD680"/>
      <stop offset="100%" stop-color="#1A7A52"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg3)"/>

  <!-- Grid sutil -->
  <g stroke="rgba(76,214,128,0.06)" stroke-width="1">
    <line x1="0" y1="90"  x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Gráfico de barras (conta caindo) — elemento principal esquerdo -->
  <g>
    <!-- Eixo Y -->
    <line x1="100" y1="80" x2="100" y2="370" stroke="rgba(237,244,240,0.20)" stroke-width="1.5"/>
    <!-- Eixo X -->
    <line x1="100" y1="370" x2="420" y2="370" stroke="rgba(237,244,240,0.20)" stroke-width="1.5"/>
    <!-- Linha de grade horizontal -->
    <line x1="100" y1="200" x2="420" y2="200" stroke="rgba(237,244,240,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="100" y1="285" x2="420" y2="285" stroke="rgba(237,244,240,0.06)" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- Barra 1 (antes) - alta -->
    <rect x="125" y="140" width="44" height="230" rx="4" fill="rgba(245,197,24,0.25)" stroke="rgba(245,197,24,0.40)" stroke-width="1"/>
    <text x="147" y="133" text-anchor="middle" fill="rgba(245,197,24,0.80)" font-size="11" font-family="Inter,sans-serif" font-weight="600">R$600</text>

    <!-- Barra 2 (meio) -->
    <rect x="195" y="200" width="44" height="170" rx="4" fill="rgba(76,214,128,0.20)" stroke="rgba(76,214,128,0.40)" stroke-width="1"/>
    <text x="217" y="193" text-anchor="middle" fill="rgba(76,214,128,0.80)" font-size="11" font-family="Inter,sans-serif" font-weight="600">R$320</text>

    <!-- Barra 3 (depois) - baixa -->
    <rect x="265" y="315" width="44" height="55" rx="4" fill="url(#barGrad)" stroke="rgba(76,214,128,0.60)" stroke-width="1"/>
    <text x="287" y="308" text-anchor="middle" fill="rgba(76,214,128,1)" font-size="11" font-family="Inter,sans-serif" font-weight="600">R$54</text>

    <!-- Seta de tendência decrescente -->
    <path d="M147 135 L217 188 L287 303" stroke="#4CD680" stroke-width="2" fill="none" stroke-dasharray="6 3" stroke-linecap="round"/>

    <!-- Labels eixo X -->
    <text x="147" y="388" text-anchor="middle" fill="rgba(237,244,240,0.35)" font-size="10" font-family="Inter,sans-serif">Antes</text>
    <text x="217" y="388" text-anchor="middle" fill="rgba(237,244,240,0.35)" font-size="10" font-family="Inter,sans-serif">Mês 2</text>
    <text x="287" y="388" text-anchor="middle" fill="rgba(237,244,240,0.35)" font-size="10" font-family="Inter,sans-serif">Solar</text>
  </g>

  <!-- Pilha de moedas (centro-direita) -->
  <g>
    <!-- Sombras das moedas -->
    <ellipse cx="560" cy="342" rx="52" ry="12" fill="rgba(0,0,0,0.30)"/>
    <!-- Moedas empilhadas -->
    <ellipse cx="558" cy="335" rx="50" ry="11" fill="#9A7800"/>
    <rect x="508" y="270" width="100" height="65" fill="#C9A000"/>
    <ellipse cx="558" cy="270" rx="50" ry="11" fill="url(#coinGrad)"/>

    <ellipse cx="558" cy="260" rx="50" ry="11" fill="#9A7800"/>
    <rect x="508" y="195" width="100" height="65" fill="#C9A000"/>
    <ellipse cx="558" cy="195" rx="50" ry="11" fill="url(#coinGrad)"/>

    <ellipse cx="558" cy="185" rx="50" ry="11" fill="#9A7800"/>
    <rect x="508" y="120" width="100" height="65" fill="#C9A000"/>
    <ellipse cx="558" cy="120" rx="50" ry="11" fill="url(#coinGrad)"/>

    <!-- Brilho nas moedas -->
    <ellipse cx="545" cy="118" rx="18" ry="5" fill="rgba(255,255,255,0.18)" transform="rotate(-15 545 118)"/>
    <ellipse cx="545" cy="193" rx="18" ry="5" fill="rgba(255,255,255,0.14)" transform="rotate(-15 545 193)"/>
    <ellipse cx="545" cy="268" rx="18" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(-15 545 268)"/>
  </g>

  <!-- Símbolo % (economia) -->
  <text x="680" y="240" text-anchor="middle" font-size="90" font-family="Inter,sans-serif" font-weight="800"
        fill="rgba(76,214,128,0.18)">%</text>
  <text x="680" y="235" text-anchor="middle" font-size="30" font-family="Inter,sans-serif" font-weight="800"
        fill="rgba(76,214,128,0.60)">-95%</text>

  <!-- Raio de energia com seta para baixo -->
  <path d="M668 260 L654 290 L663 290 L645 325 L675 288 L663 288 L680 260 Z"
        fill="rgba(76,214,128,0.65)"/>
  <text x="680" y="350" text-anchor="middle" font-size="11" font-family="Inter,sans-serif"
        fill="rgba(76,214,128,0.60)" font-weight="500">de economia</text>

  <!-- Linha base -->
  <line x1="0" y1="405" x2="800" y2="405" stroke="rgba(76,214,128,0.12)" stroke-width="1"/>
</svg>
