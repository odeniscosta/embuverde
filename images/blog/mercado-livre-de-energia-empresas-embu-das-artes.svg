<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgML" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1E34"/>
      <stop offset="100%" stop-color="#0B1628"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CD680"/>
      <stop offset="100%" stop-color="#1A7A52"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD94A"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </linearGradient>
    <linearGradient id="barGradML" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CD680"/>
      <stop offset="100%" stop-color="#1A7A52"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgML)"/>

  <!-- Grid sutil -->
  <g stroke="rgba(245,197,24,0.05)" stroke-width="1">
    <line x1="0" y1="90"  x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="250" y1="0" x2="250" y2="450"/>
    <line x1="550" y1="0" x2="550" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Barras de economia crescente (esquerda) -->
  <g stroke-width="1">
    <rect x="120" y="300" width="20" height="40" fill="rgba(76,214,128,0.12)" stroke="rgba(76,214,128,0.30)"/>
    <rect x="148" y="275" width="20" height="65" fill="rgba(76,214,128,0.18)" stroke="rgba(76,214,128,0.35)"/>
    <rect x="176" y="245" width="20" height="95" fill="rgba(76,214,128,0.24)" stroke="rgba(76,214,128,0.40)"/>
    <rect x="204" y="215" width="20" height="125" fill="url(#barGradML)" stroke="rgba(76,214,128,0.50)"/>
  </g>
  <path d="M130 295 L158 270 L186 240 L214 210" stroke="rgba(76,214,128,0.60)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Cadeado aberto = mercado livre (centro) -->
  <g>
    <!-- arco destravado (não encosta no corpo do lado direito) -->
    <path d="M372,216 V192 a30,30 0 0 1 59.4,-6" fill="none" stroke="url(#lockGrad)" stroke-width="9" stroke-linecap="round"/>
    <!-- corpo do cadeado -->
    <rect x="348" y="216" width="108" height="66" rx="12" fill="#0D2140" stroke="url(#lockGrad)" stroke-width="2.5"/>
    <!-- fechadura -->
    <circle cx="402" cy="241" r="8" fill="none" stroke="#4CD680" stroke-width="2.5"/>
    <line x1="402" y1="248" x2="402" y2="261" stroke="#4CD680" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Raios/liberdade em torno do cadeado -->
  <g stroke="rgba(245,197,24,0.55)" stroke-width="2.5" stroke-linecap="round">
    <line x1="402" y1="160" x2="402" y2="140"/>
    <line x1="466" y1="172" x2="482" y2="158"/>
    <line x1="338" y1="185" x2="320" y2="174"/>
  </g>
  <g fill="rgba(245,197,24,0.55)">
    <circle cx="402" cy="137" r="3"/>
    <circle cx="485" cy="156" r="3"/>
    <circle cx="317" cy="172" r="3"/>
  </g>

  <!-- Tag de desconto (direita) -->
  <g transform="translate(556,200)">
    <path d="M0,26 L26,0 H92 a9,9 0 0 1 9,9 V67 a9,9 0 0 1 -9,9 H26 Z" fill="rgba(245,197,24,0.10)" stroke="url(#tagGrad)" stroke-width="1.5"/>
    <circle cx="27" cy="26" r="6" fill="none" stroke="#FFD94A" stroke-width="2"/>
    <text x="98" y="53" text-anchor="middle" font-size="27" font-family="Inter,sans-serif" fill="#FFD94A" font-weight="700">-30%</text>
  </g>

  <!-- Selo "iGreen Club" (benefício extra) -->
  <g transform="translate(590,300)">
    <rect x="0" y="0" width="132" height="46" rx="23" fill="rgba(76,214,128,0.10)" stroke="rgba(76,214,128,0.45)" stroke-width="1.5"/>
    <circle cx="24" cy="23" r="10" fill="none" stroke="#4CD680" stroke-width="2"/>
    <path d="M19.5 23 L22.5 26.5 L29 18.5" stroke="#4CD680" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="45" y="28" text-anchor="start" font-size="14" font-family="Inter,sans-serif" fill="rgba(237,244,240,0.85)" font-weight="600">iGreen Club</text>
  </g>

  <!-- Sparkles decorativos -->
  <g fill="rgba(245,197,24,0.40)">
    <circle cx="160" cy="120" r="3"/>
    <circle cx="180" cy="180" r="2"/>
    <circle cx="145" cy="200" r="4"/>
    <circle cx="650" cy="110" r="3"/>
    <circle cx="672" cy="70"  r="2"/>
  </g>

  <!-- Linha do solo -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(245,197,24,0.12)" stroke-width="1"/>
</svg>
