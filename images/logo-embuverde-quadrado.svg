<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#4CD680"/>
    </linearGradient>
  </defs>
  <!-- Fundo quadrado arredondado -->
  <rect width="512" height="512" rx="80" fill="#163A2C"/>
  <!-- Círculo central (sol) -->
  <circle cx="256" cy="256" r="112" fill="url(#g)"/>
  <!-- 8 raios -->
  <g stroke="url(#g)" stroke-width="20" stroke-linecap="round">
    <!-- Cardinal -->
    <line x1="256" y1="112" x2="256" y2="48"/>
    <line x1="256" y1="400" x2="256" y2="464"/>
    <line x1="112" y1="256" x2="48"  y2="256"/>
    <line x1="400" y1="256" x2="464" y2="256"/>
    <!-- Diagonal -->
    <line x1="358" y1="154" x2="403" y2="109"/>
    <line x1="358" y1="358" x2="403" y2="403"/>
    <line x1="154" y1="358" x2="109" y2="403"/>
    <line x1="154" y1="154" x2="109" y2="109"/>
  </g>
</svg>
